on:
  schedule:
    - cron: "0 3 * * *"   # 03:00 UTC ogni giorno
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build playlist
        run: python scripts/build_m3u.py

      - name: Commit if changed
        run: |
          git config user.name "xvb-b-bot"
          git config user.email "xvb-b-bot@users.noreply.github.com"
          git add xvb-all.m3u
          if git diff --cached --quiet; then
            echo "No changes."
            exit 0
          fi
          git commit -m "auto update xvb-all.m3u"
          git push
